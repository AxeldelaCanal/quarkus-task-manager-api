services:

  # ─── Databases ───────────────────────────────────────────────────────────────

  postgres-tasks:
    image: postgres:16-alpine
    container_name: postgres-tasks
    environment:
      POSTGRES_DB: taskmanagerdb
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_tasks_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmanager -d taskmanagerdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-users:
    image: postgres:16-alpine
    container_name: postgres-users
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: userservice
      POSTGRES_PASSWORD: userservice
    ports:
      - "5433:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userservice -d usersdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Microservices ───────────────────────────────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      DB_URL: jdbc:postgresql://postgres-users:5432/usersdb
      DB_USERNAME: userservice
      DB_PASSWORD: userservice
    expose:
      - "8081"
    depends_on:
      postgres-users:
        condition: service_healthy
    restart: on-failure

  task-service:
    build:
      context: .
      dockerfile: task-service/Dockerfile
    container_name: task-service
    environment:
      DB_URL: jdbc:postgresql://postgres-tasks:5432/taskmanagerdb
      DB_USERNAME: taskmanager
      DB_PASSWORD: taskmanager
      USER_SERVICE_URL: http://user-service:8081
    expose:
      - "8080"
    depends_on:
      postgres-tasks:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: on-failure

  # ─── Reverse Proxy (HTTPS) ────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - user-service
      - task-service
    restart: on-failure

volumes:
  postgres_tasks_data:
  postgres_users_data:
